
services:
  mysql:
    image: mysql:8.0
    container_name: doctruyen_mysql
    restart: always
    
    environment:
      MYSQL_ROOT_PASSWORD: REMOVED_DB_PASSWORD
      MYSQL_DATABASE: doctruyen_db
    ports:
      - "3308:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - doctruyen_net

  backend:
    build: ./backend
    container_name: doctruyen_backend
    restart: always
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: doctruyen_db
      DB_USER: root
      DB_PASSWORD: REMOVED_DB_PASSWORD
      JWT_SECRET: REMOVED_JWT_SECRET
      CLOUDINARY_CLOUD_NAME: your_cloud_name
      CLOUDINARY_API_KEY: your_api_key
      CLOUDINARY_API_SECRET: your_api_secret
      PORT: 3000
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      - mysql
    networks:
      - doctruyen_net

volumes:
  mysql_data:

networks:
  doctruyen_net:
    driver: bridge